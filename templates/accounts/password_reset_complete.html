{% extends "base.html" %}

{% block title %}Hasło zmienione · Aster{% endblock %}

{% block content %}
<section class="auth-page">
  <div class="auth-card auth-card--status">
    <span class="auth-status-icon auth-status-icon--ok" aria-hidden="true">
      <i class="bi bi-check2-circle"></i>
    </span>
    <h1 class="auth-title">Hasło zostało zmienione</h1>
    <p class="auth-lede">Możesz teraz zalogować się nowym hasłem.</p>
    <div class="auth-actions">
      <a href="{% url 'accounts:login' %}" class="btn btn-accent">Przejdź do logowania</a>
    </div>
  </div>
</section>
{% endblock %}
