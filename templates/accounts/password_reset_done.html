{% extends "base.html" %}

{% block title %}Sprawdź pocztę · Aster{% endblock %}

{% block content %}
<section class="auth-page">
  <div class="auth-card auth-card--status">
    <span class="auth-status-icon auth-status-icon--warn" aria-hidden="true">
      <i class="bi bi-envelope-paper"></i>
    </span>
    <h1 class="auth-title">Sprawdź skrzynkę e-mail</h1>
    <p class="auth-lede">
      Jeśli konto istnieje w systemie, wysłaliśmy link do ustawienia nowego hasła. Może chwilę potrwać, zanim dotrze.
    </p>
    <div class="auth-actions">
      <a href="{% url 'accounts:login' %}" class="btn btn-accent">Wróć do logowania</a>
    </div>
  </div>
</section>
{% endblock %}
