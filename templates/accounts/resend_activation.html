{% extends "base.html" %}

{% block title %}Ponowna aktywacja{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-5">
    <section class="form-card shadow-sm">
      <h1 class="h2 mb-3">Wyślij link aktywacyjny ponownie</h1>
      <p class="text-secondary">Podaj adres e-mail użyty przy rejestracji.</p>
      <form method="post" novalidate>
        {% csrf_token %}
        {% include "partials/form_fields.html" with form=form %}
        <button type="submit" class="btn btn-dark w-100 mt-3">Wyślij ponownie</button>
      </form>
    </section>
  </div>
</div>
{% endblock %}
