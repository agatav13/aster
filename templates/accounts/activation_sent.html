{% extends "base.html" %}

{% block title %}Sprawdź pocztę{% endblock %}

{% block content %}
<section class="info-panel shadow-sm mx-auto">
  <h1 class="h2 mb-3">Sprawdź skrzynkę e-mail</h1>
  <p class="text-secondary mb-4">
    Jeśli dane były poprawne, wiadomość aktywacyjna została wysłana. Po kliknięciu linku możesz się zalogować.
  </p>
  <div class="d-flex flex-wrap gap-3 justify-content-center">
    <a href="{% url 'accounts:login' %}" class="btn btn-dark">Przejdź do logowania</a>
    <a href="{% url 'accounts:resend_activation' %}" class="btn btn-outline-dark">Wyślij link ponownie</a>
  </div>
</section>
{% endblock %}
