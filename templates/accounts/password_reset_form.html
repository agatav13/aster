{% extends "base.html" %}

{% block title %}Reset hasła{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-5">
    <section class="form-card shadow-sm">
      <h1 class="h2 mb-3">Nie pamiętasz hasła?</h1>
      <p class="text-secondary">Podaj adres e-mail, a wyślemy link do ustawienia nowego hasła.</p>
      <form method="post" novalidate>
        {% csrf_token %}
        {% include "partials/form_fields.html" with form=form %}
        <button type="submit" class="btn btn-dark w-100 mt-3">Wyślij link resetujący</button>
      </form>
    </section>
  </div>
</div>
{% endblock %}
