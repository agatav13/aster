{% extends "base.html" %}

{% block title %}Start | Aster{% endblock %}

{% block content %}
<section class="hero-panel">
  <i class="bi bi-camera-reels hero-icon"></i>
  <h1 class="hero-title">Twoje kino, Twoje zasady</h1>
  <p class="hero-subtitle">
    Odkrywaj filmy, zapisuj ulubione gatunki i buduj swoje filmowe doświadczenie.
  </p>
  <div class="d-flex flex-column align-items-center gap-3">
    <a href="{% url 'accounts:register' %}" class="btn btn-accent btn-lg hero-cta">Rozpocznij za darmo</a>
    <a href="{% url 'accounts:login' %}" class="btn btn-ghost btn-lg hero-cta">Mam już konto</a>
  </div>
  <div class="hero-features">
    <div class="hero-feature">
      <i class="bi bi-heart"></i>
      <span>Ulubione gatunki</span>
    </div>
    <div class="hero-feature">
      <i class="bi bi-shield-check"></i>
      <span>Bezpieczne konto</span>
    </div>
    <div class="hero-feature">
      <i class="bi bi-lightning"></i>
      <span>Szybki start</span>
    </div>
  </div>
</section>
{% endblock %}
