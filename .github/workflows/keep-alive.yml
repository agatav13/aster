name: keep-alive

on:
  schedule:
    - cron: "*/13 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        env:
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
        run: |
          status=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 30 "${APP_BASE_URL%/}/health/")
          echo "HTTP $status"
          test "$status" = "200"
